# ============================================================
# DNS Smart Server — Unbound Base Configuration
# ============================================================

server:
  # Networking
  interface: 0.0.0.0
  port: 53
  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes

  # Hardening & Security
  access-control: 0.0.0.0/0 allow
  hide-identity: yes
  hide-version: yes
  use-caps-for-id: no # Deprecates some nameservers if yes, better disabled for compatibility
  harden-glue: yes
  harden-dnssec-stripped: yes
  harden-below-nxdomain: yes
  harden-referral-path: yes
  qname-minimisation: yes
  
  # DNS Rebinding Protection
  private-address: 10.0.0.0/8
  private-address: 172.16.0.0/12
  private-address: 192.168.0.0/16
  private-address: 169.254.0.0/16
  private-address: fd00::/8
  private-address: fe80::/10

  # Performance & Optimization
  num-threads: 2 # Matches Docker resource limitations
  msg-cache-slabs: 4
  rrset-cache-slabs: 4
  infra-cache-slabs: 4
  key-cache-slabs: 4
  
  # Memory Limits
  msg-cache-size: 64m
  rrset-cache-size: 128m
  infra-cache-numhosts: 10000
  
  # TTL Settings
  cache-min-ttl: 30
  cache-max-ttl: 86400
  cache-max-negative-ttl: 10

  # Prefetch & Stale Fallback
  prefetch: yes
  prefetch-key: yes
  serve-expired: yes
  serve-expired-ttl: 259200 # 72 hours fallback

  # Logging Configuration
  use-syslog: no
  logfile: "/etc/unbound/unbound.log"
  log-queries: yes
  log-replies: yes
  log-tag-queryreply: yes
  verbosity: 1

  # Local Zones & Custom Records (Generated dynamically by GUI)
  include: "/etc/unbound/local-records.conf"
  include: "/etc/unbound/blocklist.conf"

remote-control:
  # Enable unbound-control for hot reloads & statistics
  control-enable: yes
  control-interface: 0.0.0.0
  control-port: 8953
  server-key-file: "/etc/unbound/unbound_server.key"
  server-cert-file: "/etc/unbound/unbound_server.pem"
  control-key-file: "/etc/unbound/unbound_control.key"
  control-cert-file: "/etc/unbound/unbound_control.pem"

include: "/etc/unbound/forwarders.conf"
